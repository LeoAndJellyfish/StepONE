name: stepone_app
description: "StepONE - 成就管理平台，帮助用户管理成就并生成简历"
publish_to: 'none'

version: 1.0.1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqlite3_flutter_libs: ^0.5.20
  path: ^1.8.3
  
  go_router: ^12.1.3
  
  provider: ^6.1.1
  
  intl: ^0.19.0
  uuid: ^4.2.1
  
  file_picker: ^10.3.10
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  
  url_launcher: ^6.2.2
  
  shared_preferences: ^2.2.2
  
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/HarmonyOS_Sans_SC_Thin.ttf
          weight: 100
        - asset: assets/fonts/HarmonyOS_Sans_SC_Light.ttf
          weight: 300
        - asset: assets/fonts/HarmonyOS_Sans_SC_Regular.ttf
          weight: 400
        - asset: assets/fonts/HarmonyOS_Sans_SC_Medium.ttf
          weight: 500
        - asset: assets/fonts/HarmonyOS_Sans_SC_Bold.ttf
          weight: 700

# Hooks 配置 - 使用系统 SQLite 避免从 GitHub 下载
hooks:
  user_defines:
    sqlite3:
      source: system
